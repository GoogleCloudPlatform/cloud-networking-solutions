# HTTP to HTTPS redirect for all paths
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
    name: http-redirect
    labels:
        app.kubernetes.io/name: unified-inference-gateway
        app.kubernetes.io/component: http-redirect
spec:
    parentRefs:
        - name: unified-inference-gateway
          sectionName: http
    hostnames:
        - "gateway.internal.YOUR_SUBDOMAIN.example.com"
    rules:
        - filters:
              - type: RequestRedirect
                requestRedirect:
                    scheme: https
                    statusCode: 301
---
# Route: Root Path (/v1) - Default model (Gemma)
# The InferenceModel CRD handles model-based routing via the request body
# This route sends all /v1/* traffic to the default InferencePool
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: root-route
    labels:
        app.kubernetes.io/name: unified-inference-gateway
        app.kubernetes.io/component: root-route
        feature: inference-pool
spec:
    parentRefs:
        - name: unified-inference-gateway
          sectionName: https
    hostnames:
        - "gateway.internal.YOUR_SUBDOMAIN.example.com"
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /v1/
          backendRefs:
              # Default to Gemma model
              # Model-based routing happens via InferenceModel CRDs
              - name: gemma-3-27b-it-pool
                group: inference.networking.k8s.io
                kind: InferencePool
        - matches:
              - path:
                    type: PathPrefix
                    value: /health
          backendRefs:
              - name: gemma-3-27b-it-pool
                group: inference.networking.k8s.io
                kind: InferencePool
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: gemma-3-27b-it-pool
                group: inference.networking.k8s.io
                kind: InferencePool
---
# Route: Model-specific paths for direct model access
# Use /models/gemma/* or /models/llama/* to route to specific models
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: gemma-model-route
    labels:
        app.kubernetes.io/name: unified-inference-gateway
        app.kubernetes.io/component: model-route
        feature: model-specific
        model: gemma-3-27b-it
spec:
    parentRefs:
        - name: unified-inference-gateway
          sectionName: https
    hostnames:
        - "gateway.internal.YOUR_SUBDOMAIN.example.com"
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /models/gemma/
          filters:
              - type: URLRewrite
                urlRewrite:
                    path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
          backendRefs:
              - name: gemma-3-27b-it-pool
                group: inference.networking.k8s.io
                kind: InferencePool
---
# Route: Security Path (/security) - With Model Armor (when enabled)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: security-route
    labels:
        app.kubernetes.io/name: unified-inference-gateway
        app.kubernetes.io/component: security-route
        feature: model-armor
spec:
    parentRefs:
        - name: unified-inference-gateway
          sectionName: https
    hostnames:
        - "gateway.internal.YOUR_SUBDOMAIN.example.com"
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /security/
          filters:
              - type: URLRewrite
                urlRewrite:
                    path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
          backendRefs:
              - name: gemma-3-27b-it-pool
                group: inference.networking.k8s.io
                kind: InferencePool
---
