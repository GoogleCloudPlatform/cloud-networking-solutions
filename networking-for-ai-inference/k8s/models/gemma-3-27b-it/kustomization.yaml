apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GKE variant: includes InferencePool, EPP, and HTTPRoute via base.
resources:
  - namespace.yaml
  - ../base
  - route.yaml

# Set namespace for all resources in this overlay
namespace: gemma-3-27b-it

# Prefix all resources for this model instance
namePrefix: gemma-3-27b-it-

configMapGenerator:
  - name: model-config
    behavior: replace
    literals:
      - MODEL_NAME=gemma-3-27b-it
      - MODEL_ID=google/gemma-3-27b-it
      - COMPUTE_CLASS=dws-flex-h100
      - NEG_NAME=gemma-3-27b-it-neg
      - POOL_NAME=gemma-3-27b-it-pool
      - MODEL_NAMESPACE=gemma-3-27b-it
      - PROJECT_ID=PLACEHOLDER_PROJECT_ID
    options:
      disableNameSuffixHash: true

replacements:
  # Replace MODEL_NAME in vLLM deployment labels
  - source:
      kind: ConfigMap
      name: model-config
      fieldPath: data.MODEL_NAME
    targets:
      - select:
          kind: Deployment
          name: vllm-deployment
        fieldPaths:
          - spec.template.metadata.labels.[ai.gke.io/model]
          - spec.selector.matchLabels.app
          - spec.template.metadata.labels.app
      - select:
          kind: Service
          name: llm-service
        fieldPaths:
          - spec.selector.app
      - select:
          kind: InferencePool
          name: pool
        fieldPaths:
          - spec.selector.matchLabels.app

  # Replace MODEL_ID in vLLM container env and args
  - source:
      kind: ConfigMap
      name: model-config
      fieldPath: data.MODEL_ID
    targets:
      - select:
          kind: Deployment
          name: vllm-deployment
        fieldPaths:
          - spec.template.spec.containers.[name=inference-server].env.[name=MODEL_ID].value

  # Replace COMPUTE_CLASS in nodeSelector
  - source:
      kind: ConfigMap
      name: model-config
      fieldPath: data.COMPUTE_CLASS
    targets:
      - select:
          kind: Deployment
          name: vllm-deployment
        fieldPaths:
          - spec.template.spec.nodeSelector.[cloud.google.com/compute-class]

  # Replace POOL_NAME in EPP args
  - source:
      kind: ConfigMap
      name: model-config
      fieldPath: data.POOL_NAME
    targets:
      - select:
          kind: Deployment
          labelSelector: app.kubernetes.io/name=epp
        fieldPaths:
          - spec.template.spec.containers.[name=epp].args.1

  # Replace NAMESPACE_PLACEHOLDER in EPP args
  - source:
      kind: ConfigMap
      name: model-config
      fieldPath: data.MODEL_NAMESPACE
    targets:
      - select:
          kind: Deployment
          labelSelector: app.kubernetes.io/name=epp
        fieldPaths:
          - spec.template.spec.containers.[name=epp].args.3
