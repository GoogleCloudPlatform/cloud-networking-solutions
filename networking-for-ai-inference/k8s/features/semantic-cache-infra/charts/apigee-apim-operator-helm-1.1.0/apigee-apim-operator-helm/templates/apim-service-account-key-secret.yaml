{{- if .Values.serviceAccountKeyFileContent }}
apiVersion: v1
kind: Secret
metadata:
  name: apigee-apim-svc-account
  namespace: apim
type: Opaque
data:
  client_secret.json: |-{{ required ".Values.serviceAccountKeyFileContent is required!!" .Values.serviceAccountKeyFileContent | b64enc | nindent 4 }}
{{- end }}
