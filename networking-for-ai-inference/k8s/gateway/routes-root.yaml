# HTTP to HTTPS redirect for all paths
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: http-redirect
spec:
  parentRefs:
    - name: unified-inference-gateway
      sectionName: http
  hostnames:
    - "gateway.internal.example.com"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
